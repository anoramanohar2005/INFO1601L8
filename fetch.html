<div class="row">
  <form id="myForm" class="col s12">
    <div class="row">
      <div class="input-field col s12">
        <input name="username" type="text" minlength="8" required>
        <label for="username">Username</label>
      </div>
    </div>

    <div class="row">
      <div class="input-field col s12">
        <input
          name="password"
          type="password"
          required
          pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$">
        <label for="password">Password</label>
      </div>
    </div>

    <div class="row">
      <div class="input-field col s12">
        <input name="email" type="email" required>
        <label for="email">Email</label>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input type="submit" class="btn waves-effect waves-light blue" value="Sign Up" />
      </div>
    </div>
  </form>
</div>

<script>
  async function postData(url, data){
    try{
      let response = await fetch(url, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: {
          'Content-Type': 'application/json'
        }
      });

      let result = await response.json();
      console.log(result);
    }
    catch(error){
      console.log(error);
    }
  }

  function submit(event){
    event.preventDefault();

    const myForm = event.target;
    const formData = new FormData(myForm);
    const data = Object.fromEntries(formData);

    console.log(data);
    postData('https://nmendezapps.firebaseio.com/users.json', data);
  }

  document.forms['myForm'].addEventListener('submit', submit);
</script>
